name: Growing Firm Gary
role: tenant
backstory: >
  Gary runs a small CPA firm with two accountants. He signed up for Webtax to replace
  his manual email-based workflow. He's moderately tech-savvy, motivated to get
  onboarded quickly, and will poke around settings out of curiosity.

responsiveness: same_day
thoroughness: medium
communication_style: casual
tech_savviness: medium

quirks:
